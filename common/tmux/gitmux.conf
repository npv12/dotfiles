tmux:
  symbols:
    branch: "ΎΕο "
    hashprefix: ":"
    ahead: "ΎΒλ "
    behind: "ΎΒμ "
    staged: "ΎΒΗ "
    conflict: "Όεπ "
    modified: "ΎΣΕ "
    untracked: "ΎΕρ "
    stashed: "ΎΔΘ "
    insertions: "ΎΒΧ "
    deletions: "ΎΒΨ "
    clean: "ΎΑΝ "

  styles:
    clear: "#[none]"
    state: "#[fg=red,bold]"
    branch: "#[fg=white,bold]"
    remote: "#[fg=cyan]"
    divergence: "#[fg=yellow]"
    staged: "#[fg=green,bold]"
    conflict: "#[fg=red,bold]"
    modified: "#[fg=yellow,bold]"
    untracked: "#[fg=magenta,bold]"
    stashed: "#[fg=cyan,bold]"
    insertions: "#[fg=green]"
    deletions: "#[fg=red]"
    clean: "#[fg=green,bold]"

  layout: [branch, divergence, " | ", flags]

  options:
    branch_max_len: 0
    branch_trim: "right"
    ellipsis: "έΑο"
    hide_clean: false
    swap_divergence: false
    divergence_space: false
    flags_without_count: false
